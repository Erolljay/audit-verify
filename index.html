<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Certificate Authentication | Tallo CPA</title>
    <style>
        :root { --primary-blue: #003366; --accent-blue: #0056b3; --light-bg: #f8f9fa; --success-green: #28a745; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--light-bg); margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background: white; max-width: 450px; width: 100%; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-top: 8px solid var(--primary-blue); overflow: hidden; }
        .header { padding: 25px; text-align: center; border-bottom: 1px solid #eee; }
        .logo { font-size: 22px; font-weight: bold; color: var(--primary-blue); margin: 0; }
        .content { padding: 30px; }
        .result-box { padding: 20px; border-radius: 8px; border: 1px solid #eee; background: #fff; }
        .valid { border-color: var(--success-green); background-color: #f0fff4; }
        .detail-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #f0f0f0; }
        .detail-row:last-child { border-bottom: none; }
        .label { color: #888; font-size: 14px; }
        .value { color: #222; font-weight: bold; font-size: 15px; text-align: right; }
        .status-msg { text-align: center; color: var(--success-green); font-weight: bold; margin-bottom: 20px; font-size: 18px; }
        .footer { text-align: center; margin-top: 30px; }
        .footer a { color: var(--accent-blue); text-decoration: none; font-size: 14px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="header"><p class="logo">TALLO CPA</p></div>
    <div class="content">
        <div id="loading">Verifying...</div>
        <div id="result" style="display:none;">
            <div id="status" class="status-msg">✅ AUTHENTIC DOCUMENT</div>
            <div class="result-box">
                <div class="detail-row"><span class="label">Client:</span> <span class="value" id="res-name"></span></div>
                <div class="detail-row"><span class="label">Audit Year:</span> <span class="value" id="res-year"></span></div>
                <div class="detail-row"><span class="label">Cert ID:</span> <span class="value" id="res-id"></span></div>
                <div class="detail-row"><span class="label">Verification Date:</span> <span class="value" id="res-date"></span></div>
            </div>
            <p style="font-size: 12px; color: #999; margin-top: 15px; text-align: center;">
                The details above must match the physical document in your possession.
            </p>
        </div>
        <div class="footer"><a href="https://www.tallocpa.com">Return to Homepage</a></div>
    </div>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');

    // Force refresh to bypass GitHub cache
    fetch('database.json?nocache=' + new Date().getTime())
        .then(r => r.json())
        .then(data => {
            document.getElementById('loading').style.display = 'none';
            const cert = data[id];
            if (cert) {
                document.getElementById('result').style.display = 'block';
                document.getElementById('res-name').innerText = cert.name;
                document.getElementById('res-year').innerText = cert.year;
                document.getElementById('res-id').innerText = id;
                document.getElementById('res-date').innerText = cert.verifiedAt;
            } else {
                document.getElementById('loading').innerHTML = "<h3 style='color:red'>❌ Invalid Certificate</h3><p>This ID was not found in our records.</p>";
            }
        });
</script>
</body>
</html>
